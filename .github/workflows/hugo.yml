name: Deploy Hugo to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: 0.146.0
    steps:
      - name: Install Hugo CLI
        run: |
          wget -O ${{ runner.temp }}/hugo.deb https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb \
          && sudo dpkg -i ${{ runner.temp }}/hugo.deb

      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Shuffle background images
        run: |
          python3 - <<'PYEOF'
          import os, random, shutil
          img_dir = "static/img"
          names = ["1.jpg", "2.jpg", "3.jpg", "4.jpg"]
          # Skontroluj ci vsetky existuju
          existing = [n for n in names if os.path.exists(os.path.join(img_dir, n))]
          if len(existing) == len(names):
              # Nahodne zamiesa mena
              shuffled = existing[:]
              while shuffled == existing:
                  random.shuffle(shuffled)
              # Premenuj cez docasne mena
              for i, name in enumerate(existing):
                  shutil.copy(os.path.join(img_dir, name), os.path.join(img_dir, f"_tmp_{i}.jpg"))
              for i, name in enumerate(shuffled):
                  os.rename(os.path.join(img_dir, f"_tmp_{i}.jpg"), os.path.join(img_dir, name))
              print("Obrazky zamieshane:", list(zip(existing, shuffled)))
          else:
              print("Nie vsetky obrazky najdene, preskakujem shuffle")
          PYEOF

      - name: Build with Hugo
        env:
          HUGO_ENVIRONMENT: production
        run: hugo --minify

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
